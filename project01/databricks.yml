# This is a Databricks asset bundle definition for project01.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: project01
  uuid: 2295ecca-3ed0-4c2d-9de6-213fb6222858

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405610823638038.18.azuredatabricks.net
    variables:
      catalog: ws_databricksprod
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405610823638038.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/pankajrajshekhawat@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/pankajrajshekhawat@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ws_databricksprod
      schema: prod
    permissions:
      - user_name: pankajrajshekhawat@gmail.com
        level: CAN_MANAGE
